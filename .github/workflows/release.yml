name: Release builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: mac
            runner: macos-latest
            command: npm run dist -- --mac
            artifacts: |
              release/*.dmg
              release/*.zip
          - os: windows
            runner: windows-latest
            command: npm run dist -- --win
            artifacts: |
              release/*.exe
              release/*.zip

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: v2t-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
