name: Release builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist -- --win
      - uses: actions/upload-artifact@v4
        with:
          name: v2t-windows
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error
